<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf6ef">
<title>Hannah 英文學習 · Home</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23faf6ef'/><text x='50' y='70' text-anchor='middle' font-size='58'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Sans+HK:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6ef;
    --cream-dark: #f2ebdc;
    --paper: #fffdf7;
    --ink: #2a2420;
    --ink-soft: #4a3f38;
    --terra: #c86b4a;
    --terra-dark: #a8512f;
    --sage: #7a8471;
    --sage-dark: #5a6451;
    --gold: #c9a84c;
    --gold-dark: #a88828;
    --blue: #5a7a8b;
    --blue-dark: #3d5a6a;
    --shadow: rgba(58, 40, 28, 0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Noto Sans HK', 'Fraunces', serif;
    background:
      radial-gradient(ellipse at top left, rgba(200, 107, 74, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(122, 132, 113, 0.08), transparent 50%),
      var(--cream);
    color: var(--ink);
    display: flex;
    flex-direction: column;
  }

  /* ============ TAB BAR (Top) ============ */
  .tab-bar {
    flex-shrink: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--cream-dark);
    padding-top: var(--safe-top);
    display: flex;
    flex-direction: column;
    z-index: 10;
  }

  .tab-bar-top {
    display: flex;
    align-items: center;
    padding: 10px 16px 6px;
    gap: 10px;
  }

  .tab-bar-title {
    flex: 1;
    min-width: 0;
  }
  .tab-bar-title .tag {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--terra-dark);
    margin-bottom: 1px;
  }
  .tab-bar-title h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    color: var(--ink);
    line-height: 1.1;
  }

  .tab-bar-lesson-btn {
    background: var(--cream);
    border: 1px solid var(--cream-dark);
    padding: 8px 14px;
    border-radius: 18px;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .tab-bar-lesson-btn:hover { background: var(--cream-dark); color: var(--ink); }

  /* The tabs themselves */
  .tabs {
    display: flex;
    padding: 0 8px 6px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 6px;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    transition: all 0.15s ease;
    min-height: 52px;
    position: relative;
  }
  .tab:hover:not(.active) { background: var(--cream); color: var(--ink); }
  .tab.active {
    background: var(--ink);
    color: var(--paper);
    font-weight: 600;
  }
  .tab .tab-icon {
    font-size: 19px;
    line-height: 1;
  }
  .tab .tab-label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13.5px;
    line-height: 1;
  }

  /* ============ CONTENT (iframe containers) ============ */
  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .app-frame {
    position: absolute;
    inset: 0;
    border: none;
    width: 100%;
    height: 100%;
    background: var(--cream);
    display: none;
  }
  .app-frame.active { display: block; }

  /* Loading state */
  .app-frame:not(.loaded) + .frame-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 15px;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ============ LESSONS MODAL ============ */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(42, 36, 32, 0.5);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    padding: 20px 0 0;
  }
  .modal-backdrop.open { display: flex; }

  .modal-sheet {
    background: var(--paper);
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    padding: 20px 20px calc(20px + var(--safe-bottom));
    animation: slideUp 0.3s cubic-bezier(0.3, 0.85, 0.4, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--cream-dark);
    border-radius: 2px;
    margin: 0 auto 14px;
  }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 4px;
    text-align: center;
  }
  .modal-sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 14px;
    text-align: center;
    margin-bottom: 16px;
  }

  .lesson-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lesson-item {
    background: var(--cream);
    border: 1.5px solid var(--cream-dark);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .lesson-item:hover {
    border-color: var(--gold);
    transform: translateX(2px);
  }
  .lesson-item .num {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--terra);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lesson-item .meta {
    flex: 1;
    min-width: 0;
  }
  .lesson-item .meta .title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 15.5px;
    color: var(--ink);
    line-height: 1.2;
  }
  .lesson-item .meta .sub {
    font-size: 12.5px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 2px;
  }
  .lesson-item .arrow {
    flex-shrink: 0;
    color: var(--ink-soft);
    font-size: 18px;
  }

  .modal-close {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--cream-dark);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .modal-close:hover { background: var(--cream); }

  /* ============ DESKTOP ============ */
  @media (min-width: 769px) {
    .tab-bar-top { padding: 14px 24px 8px; }
    .tab-bar-title h1 { font-size: 22px; }
    .tab-bar-title .tag { font-size: 13px; }
    .tabs { padding: 0 16px 8px; }
    .tab {
      flex-direction: row;
      padding: 11px 20px;
      gap: 8px;
      min-height: 48px;
    }
    .tab .tab-icon { font-size: 18px; }
    .tab .tab-label { font-size: 15px; }
    .tab-bar-lesson-btn { font-size: 14px; padding: 9px 16px; }
  }
</style>
</head>
<body>

<!-- TAB BAR -->
<div class="tab-bar">
  <div class="tab-bar-top">
    <div class="tab-bar-title">
      <div class="tag">Hannah 英文學習 · Week 1</div>
      <h1>📚 學習工具</h1>
    </div>
    <button class="tab-bar-lesson-btn" onclick="openLessons()">
      📖 <span>課堂</span>
    </button>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="flashcard" onclick="switchTab('flashcard', this)">
      <span class="tab-icon">🃏</span>
      <span class="tab-label">Flashcard</span>
    </button>
    <button class="tab" data-tab="test" onclick="switchTab('test', this)">
      <span class="tab-icon">📝</span>
      <span class="tab-label">進度測驗</span>
    </button>
    <button class="tab" data-tab="drill" onclick="switchTab('drill', this)">
      <span class="tab-icon">🎯</span>
      <span class="tab-label">Q&A Drill</span>
    </button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <iframe class="app-frame active" data-frame="flashcard" src="tools/flashcard.html" title="Flashcard"></iframe>
  <iframe class="app-frame" data-frame="test" data-src="tools/test.html" title="進度測驗"></iframe>
  <iframe class="app-frame" data-frame="drill" data-src="tools/qa-drill.html" title="Q&A Drill"></iframe>
</div>

<!-- LESSONS MODAL -->
<div class="modal-backdrop" id="lessons-modal" onclick="closeLessonsIfBackdrop(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">📖 5 堂課程</h2>
    <p class="modal-sub">Week 1 · Activation &amp; Foundations</p>

    <div class="lesson-list">
      <a class="lesson-item" href="lessons/lesson1-introduction.html">
        <span class="num">1</span>
        <div class="meta">
          <div class="title">自我介紹</div>
          <div class="sub">Self-Introduction · 5 句</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="lesson-item" href="lessons/lesson2-greetings.html">
        <span class="num">2</span>
        <div class="meta">
          <div class="title">問候語</div>
          <div class="sub">Greetings · 11 句</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="lesson-item" href="lessons/lesson3-goodbyes.html">
        <span class="num">3</span>
        <div class="meta">
          <div class="title">告別禮貌</div>
          <div class="sub">Goodbyes &amp; Politeness · 8 句</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="lesson-item" href="lessons/lesson4-questions.html">
        <span class="num">4</span>
        <div class="meta">
          <div class="title">問簡單問題</div>
          <div class="sub">Simple Questions · 5 句</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="lesson-item" href="lessons/lesson5-week1-review.html">
        <span class="num">5</span>
        <div class="meta">
          <div class="title">Week 1 綜合評估</div>
          <div class="sub">Week 1 Review &amp; Roleplay</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="lesson-item" href="lessons/placement-test.html" style="margin-top: 6px; background: var(--paper); border-style: dashed;">
        <span class="num" style="background: var(--sage);">★</span>
        <div class="meta">
          <div class="title">入學評估測試</div>
          <div class="sub">Placement Test</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <button class="modal-close" onclick="closeLessons()">關閉</button>
  </div>
</div>

<script>
// ============ TAB SWITCHING ============
let loadedFrames = new Set(['flashcard']); // flashcard starts loaded

function switchTab(tabName, btn) {
  // Update tab buttons
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  // Update iframes
  document.querySelectorAll('.app-frame').forEach(frame => {
    frame.classList.remove('active');
  });

  const targetFrame = document.querySelector(`.app-frame[data-frame="${tabName}"]`);
  targetFrame.classList.add('active');

  // Lazy-load frame if not yet loaded
  if (!loadedFrames.has(tabName)) {
    const src = targetFrame.dataset.src;
    if (src) {
      targetFrame.src = src;
      loadedFrames.add(tabName);
    }
  }

  // Save active tab to localStorage
  try { localStorage.setItem('hannah_active_tab', tabName); } catch (e) {}
}

// Restore last active tab
try {
  const lastTab = localStorage.getItem('hannah_active_tab');
  if (lastTab && lastTab !== 'flashcard') {
    const btn = document.querySelector(`.tab[data-tab="${lastTab}"]`);
    if (btn) switchTab(lastTab, btn);
  }
} catch (e) {}

// ============ LESSONS MODAL ============
function openLessons() {
  document.getElementById('lessons-modal').classList.add('open');
}
function closeLessons() {
  document.getElementById('lessons-modal').classList.remove('open');
}
function closeLessonsIfBackdrop(e) {
  if (e.target.id === 'lessons-modal') closeLessons();
}

// ESC to close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLessons();
});
</script>

</body>
</html>
